# -------------------------
# WIFI OPTIMISÉ SOLAIRE
# -------------------------
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  power_save_mode: light

  manual_ip:
    static_ip: 192.168.1.44
    gateway: 192.168.1.1
    subnet: 255.255.255.0
    dns1: 192.168.1.1

# -------------------------
# AP
# -------------------------
  ap:
    ssid: "${device_name}_AP"
    password: !secret ap_password

# -------------------------
# API
# -------------------------
api:
  encryption:
    key:  "${api_key}"

# -------------------------
# TEMPS
# -------------------------
# NTP
time:
  - platform: sntp
    id: ntp_time
    timezone: Europe/Paris


# -------------------------
# UPDATE OverTheAir
# -------------------------
ota:
  - platform: esphome
    password: !secret ota_password


# -------------------------
# MQTT
# -------------------------
mqtt:
  broker: !secret mqtt_broker
  port: 8883
  id: mqtt_client
  username: !secret mqtt_username
  password: !secret mqtt_password

  client_id: "myfoxhome"

  # TLS with Let's Encrypt CA
  certificate_authority: !secret mqtt_certificate
   

  topic_prefix: irrigation/${device_name}

  keepalive: 60s
  discovery: true

  birth_message:
    topic: irrigation/${device_name}/status
    payload: online
    qos: 1
    retain: true

  will_message:
    topic: irrigation/${device_name}/status
    payload: offline
    qos: 1
    retain: true

  log_topic:
    topic: irrigation/${device_name}/log
    qos: 0

    

# -------------------------
# WEB
# -------------------------
web_server:
  port: 80
  auth:
    username: admin
    password: !secret web_server_password